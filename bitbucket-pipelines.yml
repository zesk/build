#
# Zesk Build BitBucket Pipeline
#
# Copyright &copy; 2026 Market Acumen Inc.
#
# Requires: docker
#
# - 8x costs 8x the cost, speedup is 10% or so as most tests are I/O bound
# - 2x is adequate for Bitbucket Pipelines
#
# otherwise tests fail with `interrupt` when memory runs out (I assume)
#
image: atlassian/default-image:4

pipelines:
  branches:
    main:
      - step:
          deployment: production
          name: Production Build (1x)
          size: 1x
          services:
            - docker
          artifacts:
            - .build.env
          script:
            - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
            - bin/build.sh --commit
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
      - parallel:
          steps:
            - step:
                artifacts:
                  - .interrupt.log
                  - ./test-results/results.xml
                  - ./test-results/results.tap
                  - ./test-results/results.stats
                services:
                  - docker
                size: 2x
                name: Production Fast Tests 2x
                script:
                  - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
                  - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
                  - bin/tools.sh buildProductionTest --test-index ./test/tests.index --env-file .build.env --skip-tag slow --skip-tag package-install --junit "./test-results/" --tap "./test-results/" --stats "./test-results/"
            - step:
                artifacts:
                  - .interrupt.log
                  - ./test-results/results.xml
                  - ./test-results/results.tap
                  - ./test-results/results.stats
                services:
                  - docker
                size: 4x
                name: Production Slow Tests 4x
                script:
                  - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
                  - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
                  - bin/tools.sh buildProductionTest --test-index ./test/tests.index --env-file .build.env --tag slow --junit "./test-results/" --tap "./test-results/" --stats "./test-results/"
            - step:
                artifacts:
                  - .interrupt.log
                  - ./test-results/results.xml
                  - ./test-results/results.tap
                  - ./test-results/results.stats
                services:
                  - docker
                size: 1x
                name: Production Package Tests 1x
                script:
                  - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
                  - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
                  - bin/tools.sh buildProductionTest --env-file .build.env --tag package-install --junit "./test-results/" --tap "./test-results/" --stats "./test-results/"
      - step:
          name: Production Deploy (1x)
          size: 1x
          artifacts:
            - .interrupt.log
            - documentation/.site/
            - documentation/.docs/
          script:
            - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
            - bin/build/tools.sh environmentFileLoad .build.env --execute bin/build.sh --documentation
            - bin/deploy.sh --env-file .build.env --documentation --release
    staging:
      - step:
          artifacts:
            - .interrupt.log
            - .build.env
          size: 1x
          deployment: staging
          name: Staging Build (1x)
          services:
            - docker
          script:
            - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
            - bin/build.sh
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
      - parallel:
          steps:
            - step:
                artifacts:
                  - .interrupt.log
                  - ./test-results/results.xml
                  - ./test-results/results.tap
                  - ./test-results/results.stats
                services:
                  - docker
                size: 2x
                name: Staging Fast Tests 2x
                script:
                  - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
                  - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
                  - bin/tools.sh buildStagingTest --env-file .build.env --skip-tag slow --skip-tag package-install --junit "./test-results/" --tap "./test-results/" --stats "./test-results/"
            - step:
                artifacts:
                  - .interrupt.log
                  - ./test-results/
                services:
                  - docker
                size: 4x
                name: Staging Slow Tests 4x
                script:
                  - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
                  - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
                  - bin/tools.sh buildStagingTest --env-file .build.env --tag slow --junit "./test-results/" --tap "./test-results/" --stats "./test-results/"
            - step:
                artifacts:
                  - .interrupt.log
                  - ./test-results/results.xml
                  - ./test-results/results.tap
                  - ./test-results/results.stats
                services:
                  - docker
                size: 1x
                name: Staging Package Tests 1x
                script:
                  - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
                  - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
                  - bin/tools.sh buildStagingTest --env-file .build.env --tag package-install --junit "./test-results/" --tap "./test-results/" --stats "./test-results/"
      - step:
          name: Staging Deploy (1x)
          size: 1x
          artifacts:
            - documentation/.site/
            - documentation/.docs/
            - .interrupt.log
          script:
            - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
            - bin/build/tools.sh environmentFileLoad .build.env --execute bin/build.sh --documentation --commit
            - bin/deploy.sh --env-file .build.env --documentation --no-release
    deploy:
      - step:
          size: 1x
          artifacts:
            - .interrupt.log
            - .build.env
          deployment: deploy
          name: Just Deploy
          services:
            - docker
          script:
            - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
            - bin/build.sh --documentation
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
            - bin/deploy.sh --env-file .build.env --documentation --release
    test:
      - step:
          deployment: test
          name: Just Test (2x)
          size: 2x
          artifacts:
            - test.stats
            - .last-run-test
            - .interrupt.log
          services:
            - docker
          script:
            - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
            - IFS=' ' read -r -a aa < <(printf "%s\n" "${BUILD_TEST_ARGUMENTS-}")
            - BUILD_TEST_FLAGS="${BUILD_TEST_FLAGS-};Plumber:true;Housekeeper:true" BUILD_DEBUG="${BUILD_DEBUG-%,},usage" bin/test.sh "${aa[@]+"${aa[@]}"}"  --junit "./test-results/"
    docs-1:
      - step:
          deployment: documentation
          name: Build documentation (1x)
          size: 1x
          artifacts:
            - .build.env
            - documentation/.site/
            - documentation/.docs/
            - .interrupt.log
          script:
            - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
            - bin/build.sh --documentation --commit
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
            - bin/deploy.sh --env-file .build.env --documentation --no-release
    docs-2:
      - step:
          deployment: documentation
          name: Build documentation (2x)
          size: 2x
          artifacts:
            - .build.env
            - documentation/.site/
            - documentation/.docs/
            - .interrupt.log
          script:
            - bin/build.sh --documentation --commit
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
            - bin/deploy.sh --env-file .build.env --documentation --no-release
    docs-4:
      - step:
          deployment: documentation
          name: Build documentation (4x)
          size: 4x
          artifacts:
            - .build.env
            - documentation/.site/
            - documentation/.docs/
            - .interrupt.log
          script:
            - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
            - bin/build.sh --documentation --commit
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
            - bin/deploy.sh --env-file .build.env --documentation --no-release
    coverage:
      - step:
          deployment: coverage
          name: Coverage stats
          size: 2x
          artifacts:
            - test.stats
            - .interrupt.log
            - coverage.stats.gz
          services:
            - docker
          script:
            - bin/build/tools.sh timing --name zesk-build-load env -i PATH=$PATH HOME=$HOME bin/build/tools.sh timing timingStart
            - IFS=' ' read -r -a aa < <(printf "%s\n" "${BUILD_TEST_ARGUMENTS-}")
            - bin/build.sh --no-documentation --no-commit --debug
            - bin/tools.sh buildStepInitialize "${BUILD_TEST_DUMP_ENVIRONMENT-}"
            - BUILD_TEST_FLAGS="${BUILD_TEST_FLAGS-};Plumber:false;Housekeeper:false" BUILD_DEBUG="${BUILD_DEBUG-%,},usage" bin/test.sh --coverage "${aa[@]+"${aa[@]}"}"
            - ls -la coverage.stats
            - sort < coverage.stats | uniq -c | sort -rn > coverage.stats.uniq
            - mv -f coverage.stats.uniq coverage.stats
            - ls -la coverage.stats
            - gzip coverage.stats
